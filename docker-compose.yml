services:
  db:
    image: postgres:15
    container_name: stov_postgres
    restart: always
    environment:
      POSTGRES_USER: stov_admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: stov_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: stov_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  adminer:
    image: adminer
    container_name: stov_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  blockchain:
    image: trufflesuite/ganache-cli:latest
    container_name: stov_blockchain
    ports:
      - "8545:8545"
    volumes:
      - ganache_data:/ganache_data
    command: ["-h", "0.0.0.0", "-d", "--db", "/ganache_data", "-m", "zetech academic project secure transparent online voting system"] 
    # The "-d" and "-m" flags create a deterministic wallet so our test accounts are always the same 

volumes:
  postgres_data:
  ganache_data:
